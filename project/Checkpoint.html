<style>
/* ============================================================
   Checkpoint landing page: layout and theme
   Warm beige surfaces, plum brand accent, severity as the spine.
   ============================================================ */

/* ---- Reset ------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
html, body { margin: 0; padding: 0; }
/* nav row (64px) + its 1px bottom border. The splash fills the rest of the
   viewport below the nav so the two together are exactly one screen tall. */
:root { --nav-h: 65px; }
body { background: var(--bg-app); color: var(--text-body); overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

/* ---- Layout primitives ----------------------------------- */
.ck-container {
  width: 100%; max-width: 1200px;
  margin: 0 auto; padding: 0 32px;
}
@media (max-width: 720px) { .ck-container { padding: 0 20px; } }

.ck-section { padding: 104px 0; position: relative; }
.ck-section--tight { padding: 80px 0; }
@media (max-width: 720px) { .ck-section { padding: 72px 0; } }

.ck-band-sunken {
  background: var(--bg-sunken);
  border-top: 1px solid var(--border-hairline);
  border-bottom: 1px solid var(--border-hairline);
}

/* ---- Section header -------------------------------------- */
.ck-overline-accent {
  font-family: var(--font-mono);
  font-size: var(--fs-micro);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--accent);
  display: inline-flex; align-items: center; gap: 8px;
}
.ck-overline-accent::before {
  content: ""; width: 14px; height: 1px; background: var(--accent);
}

.ck-h-display {
  font-family: var(--font-sans); font-weight: var(--fw-bold);
  letter-spacing: var(--tracking-tight); line-height: 1.04;
  color: var(--text-max); margin: 0; text-wrap: balance;
}
.ck-h-section {
  font-family: var(--font-sans); font-weight: var(--fw-semibold);
  font-size: clamp(1.75rem, 3.2vw, 2.4rem);
  letter-spacing: var(--tracking-tight); line-height: 1.1;
  color: var(--text-max); margin: 0; text-wrap: balance;
}
.ck-lede {
  font-size: var(--fs-lg); line-height: 1.55;
  color: var(--text-secondary); margin: 0; text-wrap: pretty;
}

/* ---- Nav ------------------------------------------------- */
.ck-nav {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in oklab, var(--bg-app) 82%, transparent);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-hairline);
}
.ck-nav__row {
  height: calc(var(--nav-h) - 1px); /* + the nav's 1px bottom border = --nav-h */
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.ck-nav__links { display: flex; align-items: center; gap: 28px; }
.ck-nav__link {
  font-size: var(--fs-small); color: var(--text-secondary);
  font-weight: var(--fw-medium); letter-spacing: var(--tracking-snug);
  transition: color var(--dur-fast) var(--ease-out);
}
.ck-nav__link:hover { color: var(--text-strong); }
.ck-nav__actions { display: flex; align-items: center; gap: 10px; }
@media (max-width: 860px) { .ck-nav__links { display: none; } }

.ck-livechip {
  display: inline-flex; align-items: center; gap: 8px;
  height: 28px; padding: 0 12px 0 10px;
  border-radius: var(--radius-pill);
  background: var(--surface-card); border: 1px solid var(--border-subtle);
  font-family: var(--font-mono); font-size: var(--fs-caption);
  color: var(--text-secondary); white-space: nowrap;
}

/* ---- Hero ------------------------------------------------ */
.ck-hero { position: relative; padding: 96px 0 88px; overflow: hidden; }
.ck-hero__glow {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(680px 420px at 78% -8%, color-mix(in oklab, var(--accent) 10%, transparent), transparent 70%),
    radial-gradient(900px 500px at 8% 0%, color-mix(in oklab, var(--info) 7%, transparent), transparent 65%);
}
/* ---- Splash (full-screen landing page) ------------------- */
.ck-splash {
  /* fill the viewport minus the nav so nav + splash == one full screen */
  position: relative; height: calc(100vh - var(--nav-h)); min-height: 560px;
  overflow: hidden; background: var(--bg-app);
}
/* Faded, centered 3D ragdoll backdrop (head + torso framing). It lives
   INSIDE the 100vh splash, so scrolling to the content below carries it
   out of view. The avatar is only present on the landing screen.
   pointer-events:none. The sim reads cursor motion at the window level,
   so it never blocks the copy or links. */
.ck-splash__dummy {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.32;
  /* narrow elliptical fade so only the central head+torso column shows and
     the wide arms melt away to keep the side copy from overlapping the body */
  -webkit-mask-image: radial-gradient(26% 76% at 50% 44%, #000 46%, transparent 100%);
  mask-image: radial-gradient(26% 76% at 50% 44%, #000 46%, transparent 100%);
}
.ck-splash__dummy canvas { display: block; }
/* thin diagonal, echoing the reference layout */
.ck-splash__line {
  position: absolute; top: 14%; left: 50%; width: 1px; height: 64%;
  background: var(--border-strong); opacity: 0.5; z-index: 1;
  transform: rotate(33deg); transform-origin: top center; pointer-events: none;
}
.ck-splash__inner { position: relative; z-index: 2; height: 100%; max-width: 1280px; margin: 0 auto; }
.ck-splash__title {
  position: absolute; left: clamp(20px, 5vw, 64px); bottom: 16vh; margin: 0;
  font-family: var(--font-sans); font-weight: var(--fw-bold);
  font-size: clamp(2.3rem, 5.6vw, 5rem); line-height: 0.9;
  letter-spacing: -0.035em; color: var(--text-max);
}
.ck-splash__dot { display: inline-block; width: 0.13em; height: 0.13em; border-radius: 50%; background: var(--accent); margin-left: 0.04em; }
.ck-splash__intro {
  position: absolute; right: clamp(20px, 5vw, 64px); top: 17%;
  width: min(400px, 40vw); text-align: right;
  display: flex; flex-direction: column; align-items: flex-end; gap: 14px;
}
.ck-splash__lead {
  margin: 0; color: var(--text-max); font-family: var(--font-sans); font-weight: var(--fw-semibold);
  font-size: clamp(1.05rem, 1.7vw, 1.4rem); line-height: 1.25; letter-spacing: var(--tracking-snug);
}
.ck-splash__sub { margin: 0; color: var(--text-secondary); line-height: 1.55; }
.ck-splash__cta { margin: 4px 0 0; font-family: var(--font-mono); font-size: var(--fs-small); letter-spacing: var(--tracking-snug); color: var(--text-muted); }
.ck-splash__cta a { color: var(--accent); border-bottom: 1px solid color-mix(in oklab, var(--accent) 45%, transparent); }
.ck-splash__cta a:hover { color: var(--text-max); }
.ck-splash__scroll {
  position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 2;
  font-family: var(--font-mono); font-size: var(--fs-micro); letter-spacing: var(--tracking-caps);
  text-transform: uppercase; color: var(--text-muted);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.ck-splash__scroll::after { content: ""; width: 1px; height: 22px; background: var(--border-strong); }
@media (max-width: 860px) {
  .ck-splash__title { font-size: clamp(2.75rem, 15vw, 5rem); bottom: auto; top: 15%; }
  .ck-splash__intro { top: auto; bottom: 16%; left: clamp(20px, 5vw, 64px); right: clamp(20px, 5vw, 64px); width: auto; }
  .ck-splash__line { display: none; }
  .ck-splash__dummy { opacity: 0.26; }
}
@media (prefers-reduced-motion: reduce) { .ck-splash__dummy { opacity: 0.28; } }

.ck-hero__grid {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1.02fr 0.98fr; gap: 56px; align-items: center;
}
@media (max-width: 980px) { .ck-hero__grid { grid-template-columns: 1fr; gap: 44px; } }
.ck-hero__copy { display: flex; flex-direction: column; gap: 24px; align-items: flex-start; }
.ck-hero h1 { font-size: clamp(2.4rem, 5.2vw, 3.75rem); }
.ck-hero__ctas { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.ck-hero__trust {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-muted);
}
.ck-hero__trust .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong); }

/* ---- Generic grids --------------------------------------- */
.ck-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.ck-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 860px) {
  .ck-grid-3 { grid-template-columns: 1fr; }
  .ck-grid-2 { grid-template-columns: 1fr; }
}

.ck-head-block { display: flex; flex-direction: column; gap: 16px; max-width: 720px; }
.ck-head-center { align-items: center; text-align: center; margin: 0 auto; }

/* ---- Step rail ------------------------------------------ */
.ck-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
@media (max-width: 860px) { .ck-steps { grid-template-columns: 1fr; } }
.ck-stepnum {
  font-family: var(--font-mono); font-size: var(--fs-caption);
  color: var(--accent); letter-spacing: var(--tracking-wide);
}

/* ---- Recording frame ------------------------------------ */
.ck-recording {
  position: relative; border-radius: var(--radius-lg);
  border: 1px solid var(--border-subtle); overflow: hidden;
  background: var(--surface-inset);
}
.ck-recording__bar {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; border-bottom: 1px solid var(--border-hairline);
  background: var(--surface-panel);
  font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-muted);
}

/* ---- Comparison cards ----------------------------------- */
.ck-compare { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media (max-width: 860px) { .ck-compare { grid-template-columns: 1fr; } }
.ck-compare__label {
  font-family: var(--font-mono); font-size: var(--fs-micro);
  letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-muted);
}

/* ---- Roadmap timeline ----------------------------------- */
.ck-roadmap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; position: relative; }
@media (max-width: 860px) { .ck-roadmap { grid-template-columns: 1fr; gap: 20px; } }
.ck-roadmap__item { padding: 0 22px; position: relative; }
.ck-roadmap__item:first-child { padding-left: 0; }
.ck-roadmap__node { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.ck-roadmap__line { flex: 1; height: 1px; background: var(--border-subtle); }
.ck-roadmap__pin { width: 9px; height: 9px; border-radius: 50%; flex: none; }

/* ---- CTA band ------------------------------------------- */
.ck-cta {
  position: relative; overflow: hidden;
  border: 1px solid var(--border-subtle); border-radius: var(--radius-xl);
  background:
    radial-gradient(620px 320px at 88% 120%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 70%),
    var(--surface-panel);
  padding: 64px 56px;
}
@media (max-width: 720px) { .ck-cta { padding: 44px 28px; } }
.ck-cta__form { display: flex; gap: 10px; flex-wrap: wrap; }

/* ---- Footer --------------------------------------------- */
.ck-footer { border-top: 1px solid var(--border-hairline); background: var(--bg-sunken); }
.ck-footer__row {
  display: flex; justify-content: space-between; gap: 32px; flex-wrap: wrap;
  padding: 48px 0 40px;
}
.ck-footer__cols { display: flex; gap: 56px; flex-wrap: wrap; }
.ck-footer__col { display: flex; flex-direction: column; gap: 10px; }
.ck-footer__col h5 {
  margin: 0 0 4px; font-family: var(--font-mono); font-size: var(--fs-micro);
  letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-muted);
  font-weight: var(--fw-medium);
}
.ck-footer__col a { font-size: var(--fs-small); color: var(--text-secondary); transition: color var(--dur-fast); }
.ck-footer__col a:hover { color: var(--text-strong); }

/* ---- Entrance animation --------------------------------- */
/* Content is always visible. Transitions freeze when backgrounded, so the
   end-state must never depend on one running. is-in adds a one-shot lift. */
.ck-reveal { opacity: 1; }
@media (prefers-reduced-motion: no-preference) {
  .ck-reveal.is-in { animation: ck-stream-in var(--dur-slow) var(--ease-out) both; }
}

/* ---- Shimmer progress bar ------------------------------- */
.ck-shimmerbar { height: 6px; border-radius: var(--radius-pill); background: var(--live-track); overflow: hidden; }
.ck-shimmerbar > span {
  display: block; height: 100%; width: 42%; border-radius: inherit;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  background-size: 200% 100%; animation: ck-shimmer var(--dur-shimmer) linear infinite;
}
@media (prefers-reduced-motion: reduce) { .ck-shimmerbar > span { animation: none; } }

.ck-divider { height: 1px; background: var(--border-hairline); width: 100%; }

/* ---- Responsive overrides for inline grids -------------- */
@media (max-width: 920px) {
  .ck-reports-grid { grid-template-columns: 1fr !important; }
  .ck-cta-grid     { grid-template-columns: 1fr !important; }
}

/* ============================================================
   BEIGE + PLUM THEME
   Remaps the dark-first design system tokens to a warm light
   palette. DS components read these var(--*) aliases, so they
   adapt automatically. Plum/wine replaces the lime brand accent.
   ============================================================ */
:root {
  color-scheme: light;

  /* surfaces: warm cream ramp */
  --bg-app:         #ece3d2;
  --bg-sunken:      #e3d8c3;
  --surface-panel:  #f2ecdf;
  --surface-card:   #f8f2e8;
  --surface-raised: #fcf7ef;
  --surface-inset:  #e6dcc9;
  --surface-hover:  #efe7d7;

  /* borders */
  --border-subtle:   #d4c6ab;
  --border-hairline: #ddd0b8;
  --border-strong:   #c2b193;

  /* text: warm near-black ramp */
  --text-max:       #20190d;
  --text-strong:    #2f2718;
  --text-body:      #463c29;
  --text-secondary: #6a5f49;
  --text-muted:     #8f8369;
  --text-disabled:  #b3a585;

  /* severity chip backgrounds softened to light tints */
  --critical-bg: #f6e0df;
  --warning-bg:  #f8ead0;
  --healthy-bg:  #dcf1e4;
  --info-bg:     #dce8f6;

  /* live shimmer track */
  --live-track: #ead7df;

  /* brand ramp: plum/wine (complements warm beige, distinct from all severity hues) */
  --lime-muted:  #ead7df;
  --lime-dim:    #c07d96;
  --lime:        #9b3a61;
  --lime-bright: #b34973;
  --lime-on:     #fbf4ef;

  /* focus ring */
  --ring: 0 0 0 2px var(--bg-app), 0 0 0 4px var(--accent-dim);
}

/* selection highlight */
::selection { background: var(--accent); color: var(--lime-on); }
</style>

<script type="text/babel">
/* ============================================================
   Checkpoint: landing page components
   Single compiled bundle (no separate JSX file fetches).
   ============================================================ */

const CK = window.CheckpointDesignSystem_70abd3;
const { useRef, useEffect, useState } = React;

/* ------------------------------------------------------------------ */
/* PRIMITIVES                                                           */
/* ------------------------------------------------------------------ */

function Container({ children, style }) {
  return <div className="ck-container" style={style}>{children}</div>;
}

function Overline({ children }) {
  return <span className="ck-overline-accent">{children}</span>;
}

/* Reveal: content is always visible (end-state is the base state).
   IntersectionObserver fires a one-shot entrance animation when the
   element scrolls in, but a missed trigger never hides anything. */
function Reveal({ children, delay = 0, as = 'div', className = '', style }) {
  const ref = useRef(null);
  const [animate, setAnimate] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el || !('IntersectionObserver' in window)) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { setAnimate(true); io.disconnect(); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const Tag = as;
  return (
    <Tag ref={ref}
      className={`ck-reveal ${animate ? 'is-in' : ''} ${className}`}
      style={{ animationDelay: `${delay}ms`, ...style }}>
      {children}
    </Tag>
  );
}

function SectionHead({ overline, title, lede, center = false, maxWidth }) {
  return (
    <div className={`ck-head-block ${center ? 'ck-head-center' : ''}`}
      style={maxWidth ? { maxWidth } : undefined}>
      {overline && <Overline>{overline}</Overline>}
      <h2 className="ck-h-section">{title}</h2>
      {lede && <p className="ck-lede">{lede}</p>}
    </div>
  );
}

/* Stroke icons: drawn inline so no icon font dependency */
function Icon({ name, size = 18, stroke = 1.75, style }) {
  const paths = {
    upload:   <><path d="M12 16V4M12 4l-4 4M12 4l4 4" strokeLinecap="round" strokeLinejoin="round"/><path d="M4 16v2.5A1.5 1.5 0 0 0 5.5 20h13a1.5 1.5 0 0 0 1.5-1.5V16" strokeLinecap="round"/></>,
    target:   <><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.6" fill="currentColor" stroke="none"/></>,
    play:     <><path d="M7 5.5l11 6.5-11 6.5z" strokeLinejoin="round"/></>,
    arrow:    <><path d="M5 12h14M13 6l6 6-6 6" strokeLinecap="round" strokeLinejoin="round"/></>,
    bolt:     <><path d="M13 3L5 13h6l-1 8 8-10h-6z" strokeLinejoin="round"/></>,
    repeat:   <><path d="M4 9a6 6 0 0 1 10-2l2 2M20 15a6 6 0 0 1-10 2l-2-2" strokeLinecap="round" strokeLinejoin="round"/><path d="M16 5v4h-4M8 19v-4h4" strokeLinecap="round" strokeLinejoin="round"/></>,
    clock:    <><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2" strokeLinecap="round" strokeLinejoin="round"/></>,
    hand:     <><path d="M9 11V5.5a1.5 1.5 0 0 1 3 0V11m0-1.5a1.5 1.5 0 0 1 3 0V12m0-1a1.5 1.5 0 0 1 3 0v4a6 6 0 0 1-6 6h-1.2a5 5 0 0 1-3.6-1.6L4 17l1.2-1.2a1.6 1.6 0 0 1 2.2-.1L9 17" strokeLinecap="round" strokeLinejoin="round"/></>,
    layers:   <><path d="M12 3l8.5 4.5L12 12 3.5 7.5 12 3z" strokeLinejoin="round"/><path d="M3.5 12L12 16.5 20.5 12M3.5 16.5L12 21l8.5-4.5" strokeLinejoin="round"/></>,
    check:    <><path d="M5 12.5l4.2 4.2L19 7" strokeLinecap="round" strokeLinejoin="round"/></>,
    cpu:      <><rect x="6.5" y="6.5" width="11" height="11" rx="2"/><path d="M10 3v2.5M14 3v2.5M10 18.5V21M14 18.5V21M3 10h2.5M3 14h2.5M18.5 10H21M18.5 14H21" strokeLinecap="round"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth={stroke} style={style} aria-hidden="true">
      {paths[name] || null}

  );
}

function IconTile({ name, accent = 'var(--accent)', size = 20 }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      width: 40, height: 40, borderRadius: 'var(--radius-md)',
      background: 'var(--surface-inset)', border: '1px solid var(--border-subtle)',
      color: accent, flex: 'none',
    }}>
      <Icon name={name} size={size} />
    </span>
  );
}

/* ------------------------------------------------------------------ */
/* NAV + HERO                                                           */
/* ------------------------------------------------------------------ */

    }
    driveDFS(rootBone, rootParentWorld);
  }

  // ---- cursor → strike (window-level; canvas is pointer-events:none) ----
  const raycaster = new THREE.Raycaster(), ndc = new THREE.Vector2(-2, -2);
  let haveCursor = false, moveX = 0, moveY = 0, cursorSpeed = 0;
  const IMPULSE_K = 0.16, SPEED_CLAMP = 90, SPIN = 2.8, SPIN_MAXW = 26;
  window.addEventListener('mousemove', (e) => {
    const r = renderer.domElement.getBoundingClientRect();
    if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) { haveCursor = false; return; }

  const _right = new THREE.Vector3(), _up = new THREE.Vector3();
  function tryStrike() {
    if (!haveCursor) return;
    raycaster.setFromCamera(ndc, camera);
    const hits = raycaster.intersectObjects(pickMeshes, false);
    if (!hits.length) return;
    if (cursorSpeed < 0.4) return;

    const dir = new THREE.Vector3().addScaledVector(_right, moveX).addScaledVector(_up, -moveY);
    if (dir.lengthSq() < 1e-8) return; dir.normalize();

    const impulse = new CANNON.Vec3(dir.x * mag, dir.y * mag, dir.z * mag);
    const rel = new CANNON.Vec3(hits[0].point.x - body.position.x, hits[0].point.y - body.position.y, hits[0].point.z - body.position.z);

    av.x += dO.x * SPIN; av.y += dO.y * SPIN; av.z += dO.z * SPIN;

  // ---- loop ----
  const clock = new THREE.Clock(), FIXED = 1 / 60; let acc = 0;
  function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta(); if (dt > 0.1) dt = 0.1;

    driveBones();
    renderer.render(scene, camera);
  }
}
