<style>
/* ============================================================
   Checkpoint landing page: layout and theme
   Warm beige surfaces, plum brand accent, severity as the spine.
   ============================================================ */

/* ---- Reset ------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
html, body { margin: 0; padding: 0; }
/* nav row (64px) + its 1px bottom border. The splash fills the rest of the
   viewport below the nav so the two together are exactly one screen tall. */
:root { --nav-h: 65px; }
body { background: var(--bg-app); color: var(--text-body); overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

/* ---- Layout primitives ----------------------------------- */
.ck-container {
  width: 100%; max-width: 1200px;
  margin: 0 auto; padding: 0 32px;
}
@media (max-width: 720px) { .ck-container { padding: 0 20px; } }

.ck-section { padding: 104px 0; position: relative; }
.ck-section--tight { padding: 80px 0; }
@media (max-width: 720px) { .ck-section { padding: 72px 0; } }

.ck-band-sunken {
  background: var(--bg-sunken);
  border-top: 1px solid var(--border-hairline);
  border-bottom: 1px solid var(--border-hairline);
}

/* ---- Section header -------------------------------------- */
.ck-overline-accent {
  font-family: var(--font-mono);
  font-size: var(--fs-micro);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--accent);
  display: inline-flex; align-items: center; gap: 8px;
}
.ck-overline-accent::before {
  content: ""; width: 14px; height: 1px; background: var(--accent);
}

.ck-h-display {
  font-family: var(--font-sans); font-weight: var(--fw-bold);
  letter-spacing: var(--tracking-tight); line-height: 1.04;
  color: var(--text-max); margin: 0; text-wrap: balance;
}
.ck-h-section {
  font-family: var(--font-sans); font-weight: var(--fw-semibold);
  font-size: clamp(1.75rem, 3.2vw, 2.4rem);
  letter-spacing: var(--tracking-tight); line-height: 1.1;
  color: var(--text-max); margin: 0; text-wrap: balance;
}
.ck-lede {
  font-size: var(--fs-lg); line-height: 1.55;
  color: var(--text-secondary); margin: 0; text-wrap: pretty;
}

/* ---- Nav ------------------------------------------------- */
.ck-nav {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in oklab, var(--bg-app) 82%, transparent);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-hairline);
}
.ck-nav__row {
  height: calc(var(--nav-h) - 1px); /* + the nav's 1px bottom border = --nav-h */
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.ck-nav__links { display: flex; align-items: center; gap: 28px; }
.ck-nav__link {
  font-size: var(--fs-small); color: var(--text-secondary);
  font-weight: var(--fw-medium); letter-spacing: var(--tracking-snug);
  transition: color var(--dur-fast) var(--ease-out);
}
.ck-nav__link:hover { color: var(--text-strong); }
.ck-nav__cta {
  display: inline-flex; align-items: center;
  background: var(--accent); color: var(--lime-on);
  padding: 9px 18px; border-radius: var(--radius-pill);
  font-size: var(--fs-small); font-weight: var(--fw-semibold); letter-spacing: var(--tracking-snug);
  transition: background var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out);
}
.ck-nav__cta:hover { background: var(--accent-hover); transform: translateY(-1px); }
.ck-nav__actions { display: flex; align-items: center; gap: 10px; }
@media (max-width: 860px) { .ck-nav__links { display: none; } }

.ck-livechip {
  display: inline-flex; align-items: center; gap: 8px;
  height: 28px; padding: 0 12px 0 10px;
  border-radius: var(--radius-pill);
  background: var(--surface-card); border: 1px solid var(--border-subtle);
  font-family: var(--font-mono); font-size: var(--fs-caption);
  color: var(--text-secondary); white-space: nowrap;
}

/* ---- Hero ------------------------------------------------ */
.ck-hero { position: relative; padding: 96px 0 88px; overflow: hidden; }
.ck-hero__glow {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(680px 420px at 78% -8%, color-mix(in oklab, var(--accent) 10%, transparent), transparent 70%),
    radial-gradient(900px 500px at 8% 0%, color-mix(in oklab, var(--info) 7%, transparent), transparent 65%);
}
/* ---- Splash (full-screen landing page) ------------------- */
.ck-splash {
  /* fill the viewport minus the nav so nav + splash == one full screen */
  position: relative; height: calc(100vh - var(--nav-h)); min-height: 560px;
  overflow: hidden; background: var(--bg-app);
}
/* Faded, centered 3D ragdoll backdrop (head + torso framing). It lives
   INSIDE the 100vh splash, so scrolling to the content below carries it
   out of view. The avatar is only present on the landing screen.
   pointer-events:none. The sim reads cursor motion at the window level,
   so it never blocks the copy or links. */
.ck-splash__dummy {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.32;
  /* narrow elliptical fade so only the central head+torso column shows and
     the wide arms melt away to keep the side copy from overlapping the body */
  -webkit-mask-image: radial-gradient(26% 76% at 50% 44%, #000 46%, transparent 100%);
  mask-image: radial-gradient(26% 76% at 50% 44%, #000 46%, transparent 100%);
}
.ck-splash__dummy canvas { display: block; }
/* thin diagonal, echoing the reference layout */
.ck-splash__line {
  position: absolute; top: 14%; left: 50%; width: 1px; height: 64%;
  background: var(--border-strong); opacity: 0.5; z-index: 1;
  transform: rotate(33deg); transform-origin: top center; pointer-events: none;
}
.ck-splash__inner { position: relative; z-index: 2; height: 100%; max-width: 1280px; margin: 0 auto; }
.ck-splash__title {
  position: absolute; left: clamp(20px, 5vw, 64px); bottom: 16vh; margin: 0;
  font-family: var(--font-sans); font-weight: var(--fw-bold);
  font-size: clamp(2.3rem, 5.6vw, 5rem); line-height: 0.9;
  letter-spacing: -0.035em; color: var(--text-max);
}
.ck-splash__dot { display: inline-block; width: 0.13em; height: 0.13em; border-radius: 50%; background: var(--accent); margin-left: 0.04em; }
.ck-splash__intro {
  position: absolute; right: clamp(20px, 5vw, 64px); top: 17%;
  width: min(400px, 40vw); text-align: right;
  display: flex; flex-direction: column; align-items: flex-end; gap: 14px;
}
.ck-splash__lead {
  margin: 0; color: var(--text-max); font-family: var(--font-sans); font-weight: var(--fw-semibold);
  font-size: clamp(1.05rem, 1.7vw, 1.4rem); line-height: 1.25; letter-spacing: var(--tracking-snug);
}
.ck-splash__sub { margin: 0; color: var(--text-secondary); line-height: 1.55; }
.ck-splash__cta { margin: 4px 0 0; font-family: var(--font-mono); font-size: var(--fs-small); letter-spacing: var(--tracking-snug); color: var(--text-muted); }
.ck-splash__cta a { color: var(--accent); border-bottom: 1px solid color-mix(in oklab, var(--accent) 45%, transparent); }
.ck-splash__cta a:hover { color: var(--text-max); }
.ck-splash__scroll {
  position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 2;
  font-family: var(--font-mono); font-size: var(--fs-micro); letter-spacing: var(--tracking-caps);
  text-transform: uppercase; color: var(--text-muted);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.ck-splash__scroll::after { content: ""; width: 1px; height: 22px; background: var(--border-strong); }
@media (max-width: 860px) {
  .ck-splash__title { font-size: clamp(2.75rem, 15vw, 5rem); bottom: auto; top: 15%; }
  .ck-splash__intro { top: auto; bottom: 16%; left: clamp(20px, 5vw, 64px); right: clamp(20px, 5vw, 64px); width: auto; }
  .ck-splash__line { display: none; }
  .ck-splash__dummy { opacity: 0.26; }
}
@media (prefers-reduced-motion: reduce) { .ck-splash__dummy { opacity: 0.28; } }

.ck-hero__grid {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1.02fr 0.98fr; gap: 56px; align-items: center;
}
@media (max-width: 980px) { .ck-hero__grid { grid-template-columns: 1fr; gap: 44px; } }
.ck-hero__copy { display: flex; flex-direction: column; gap: 24px; align-items: flex-start; }
.ck-hero h1 { font-size: clamp(2.4rem, 5.2vw, 3.75rem); }
.ck-hero__ctas { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.ck-hero__trust {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-muted);
}
.ck-hero__trust .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong); }

/* ---- Generic grids --------------------------------------- */
.ck-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.ck-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 860px) {
  .ck-grid-3 { grid-template-columns: 1fr; }
  .ck-grid-2 { grid-template-columns: 1fr; }
}

.ck-head-block { display: flex; flex-direction: column; gap: 16px; max-width: 720px; }
.ck-head-center { align-items: center; text-align: center; margin: 0 auto; }

/* ---- Step rail ------------------------------------------ */
.ck-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
@media (max-width: 860px) { .ck-steps { grid-template-columns: 1fr; } }
.ck-stepnum {
  font-family: var(--font-mono); font-size: var(--fs-caption);
  color: var(--accent); letter-spacing: var(--tracking-wide);
}

/* ---- Recording frame ------------------------------------ */
.ck-recording {
  position: relative; border-radius: var(--radius-lg);
  border: 1px solid var(--border-subtle); overflow: hidden;
  background: var(--surface-inset);
}
.ck-recording__bar {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; border-bottom: 1px solid var(--border-hairline);
  background: var(--surface-panel);
  font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-muted);
}

/* ---- Comparison cards ----------------------------------- */
.ck-compare { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media (max-width: 860px) { .ck-compare { grid-template-columns: 1fr; } }
.ck-compare__label {
  font-family: var(--font-mono); font-size: var(--fs-micro);
  letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-muted);
}

/* ---- Roadmap timeline ----------------------------------- */
.ck-roadmap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; position: relative; }
@media (max-width: 860px) { .ck-roadmap { grid-template-columns: 1fr; gap: 20px; } }
.ck-roadmap__item { padding: 0 22px; position: relative; }
.ck-roadmap__item:first-child { padding-left: 0; }
.ck-roadmap__node { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.ck-roadmap__line { flex: 1; height: 1px; background: var(--border-subtle); }
.ck-roadmap__pin { width: 9px; height: 9px; border-radius: 50%; flex: none; }

/* ---- CTA band ------------------------------------------- */
.ck-cta {
  position: relative; overflow: hidden;
  border: 1px solid var(--border-subtle); border-radius: var(--radius-xl);
  background:
    radial-gradient(620px 320px at 88% 120%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 70%),
    var(--surface-panel);
  padding: 64px 56px;
}
@media (max-width: 720px) { .ck-cta { padding: 44px 28px; } }
.ck-cta__form { display: flex; gap: 10px; flex-wrap: wrap; }

/* ---- Footer --------------------------------------------- */
.ck-footer { border-top: 1px solid var(--border-hairline); background: var(--bg-sunken); }
.ck-footer__row {
  display: flex; justify-content: space-between; gap: 32px; flex-wrap: wrap;
  padding: 48px 0 40px;
}
.ck-footer__cols { display: flex; gap: 56px; flex-wrap: wrap; }
.ck-footer__col { display: flex; flex-direction: column; gap: 10px; }
.ck-footer__col h5 {
  margin: 0 0 4px; font-family: var(--font-mono); font-size: var(--fs-micro);
  letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-muted);
  font-weight: var(--fw-medium);
}
.ck-footer__col a { font-size: var(--fs-small); color: var(--text-secondary); transition: color var(--dur-fast); }
.ck-footer__col a:hover { color: var(--text-strong); }

/* ---- Entrance animation --------------------------------- */
/* Content is always visible. Transitions freeze when backgrounded, so the
   end-state must never depend on one running. is-in adds a one-shot slide-in
   as each section scrolls into view (more pronounced than the DS default). */
.ck-reveal { opacity: 1; }
@media (prefers-reduced-motion: no-preference) {
  .ck-reveal.is-in { animation: ck-reveal-in 0.72s var(--ease-out) both; }
}
@keyframes ck-reveal-in {
  from { opacity: 0; transform: translateY(34px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- Shimmer progress bar ------------------------------- */
.ck-shimmerbar { height: 6px; border-radius: var(--radius-pill); background: var(--live-track); overflow: hidden; }
.ck-shimmerbar > span {
  display: block; height: 100%; width: 42%; border-radius: inherit;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  background-size: 200% 100%; animation: ck-shimmer var(--dur-shimmer) linear infinite;
}
@media (prefers-reduced-motion: reduce) { .ck-shimmerbar > span { animation: none; } }

.ck-divider { height: 1px; background: var(--border-hairline); width: 100%; }

/* ---- Responsive overrides for inline grids -------------- */
@media (max-width: 920px) {
  .ck-reports-grid { grid-template-columns: 1fr !important; }
  .ck-cta-grid     { grid-template-columns: 1fr !important; }
  .ck-solution-grid { grid-template-columns: 1fr !important; }
  .ck-contact-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
}
@media (max-width: 560px) {
  .ck-contact-row { grid-template-columns: 1fr !important; }
}

/* ---- AI Bots page: nav link active state ---------------- */
.ck-nav__link.is-active { color: var(--accent); }

/* ---- Second scheme colour: dark-beige band -------------- */
/* A deeper warm tone behind the "what we do" section. Text on the band is
   forced to the near-black ink ramp so it stays readable on #9f8c76. */
.ck-band-beige {
  background: var(--beige-dark);
  border-top: 1px solid var(--beige-dark-deep);
  border-bottom: 1px solid var(--beige-dark-deep);
}
.ck-band-beige .ck-h-section,
.ck-band-beige .ck-h-display { color: var(--beige-dark-ink); }
.ck-band-beige .ck-lede,
.ck-band-beige .ck-band-beige__sub { color: var(--beige-dark-sub); }
.ck-band-beige .ck-overline-accent { color: var(--beige-dark-ink); }
.ck-band-beige .ck-overline-accent::before { background: var(--accent); }
.ck-accent-rule-beige { height: 3px; background: var(--beige-dark); border-radius: var(--radius-pill); }

/* ---- Scroll-driven animations (progressive enhancement) --- */
/* Reference: CSS scroll-driven animations (animation-timeline). They run on
   the compositor, so they stay smooth, and degrade to "no animation" where
   unsupported or where the user prefers reduced motion. */
.ck-scroll-progress {
  position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 200;
  background: linear-gradient(90deg, var(--accent), var(--beige-dark));
  transform: scaleX(0); transform-origin: 0 50%; pointer-events: none;
}
.ck-sr { opacity: 1; }            /* base state: always visible (no-JS / no-support safe) */
.ck-parallax { will-change: transform; }
@supports (animation-timeline: scroll()) {
  @media (prefers-reduced-motion: no-preference) {
    .ck-scroll-progress {
      animation: ck-progress-grow linear both;
      animation-timeline: scroll(root);
    }
  }
}
@supports (animation-timeline: view()) {
  @media (prefers-reduced-motion: no-preference) {
    .ck-sr {
      animation: ck-sr-rise linear both;
      animation-timeline: view();
      animation-range: entry 0% entry 60%;
    }
    .ck-parallax {
      animation: ck-parallax-drift linear both;
      animation-timeline: view();
      animation-range: entry 0% exit 100%;
    }
  }
}
@keyframes ck-progress-grow { to { transform: scaleX(1); } }
@keyframes ck-sr-rise {
  from { opacity: 0; transform: translateY(34px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes ck-parallax-drift {
  from { transform: translateY(26px); }
  to   { transform: translateY(-26px); }
}

/* ---- Depth + motion polish (richer than flat minimal) ---- */
:root {
  --shadow-soft: 0 14px 34px -22px rgba(40, 28, 12, 0.42);
  --shadow-lift: 0 24px 52px -24px rgba(40, 28, 12, 0.52);
}
/* soft elevation on the instrument panels and the CTA band */
.ck-recording, .ck-cta { box-shadow: var(--shadow-soft); }
/* hover-lift utility for cards we own (kept off animated wrappers) */
.ck-elevate { transition: transform var(--dur-slow) var(--ease-out), box-shadow var(--dur-slow) var(--ease-out); will-change: transform; }
.ck-elevate:hover { transform: translateY(-6px); box-shadow: var(--shadow-lift); }
/* interaction polish */
.ck-nav__link { transition: color var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out); }
.ck-nav__link:hover { transform: translateY(-1px); }
a, button { transition: transform var(--dur-fast) var(--ease-out), opacity var(--dur-fast) var(--ease-out); }
button:active { transform: translateY(1px); }

@media (prefers-reduced-motion: no-preference) {
  /* brand glows breathe + drift so the hero and CTA never feel static */
  .ck-hero__glow { animation: ck-glow-breathe 11s ease-in-out infinite; }
  .ck-cta::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(420px 240px at 12% -20%, color-mix(in oklab, var(--accent) 14%, transparent), transparent 70%);
    animation: ck-glow-drift 15s ease-in-out infinite alternate;
  }
  /* faint surveying grid drifts across the dark-beige band */
  .ck-band-beige::before { animation: ck-grid-pan 26s linear infinite; }
}
@keyframes ck-glow-breathe { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.06); } }
@keyframes ck-glow-drift  { from { transform: translate(0, 0); } to { transform: translate(46px, 22px); } }
@keyframes ck-grid-pan    { from { background-position: 0 0; } to { background-position: 46px 46px; } }

/* dark-beige band: gridlines at the edges, keep CTA copy above the glow */
.ck-band-beige { position: relative; }
.ck-band-beige > .ck-container { position: relative; z-index: 1; }
.ck-band-beige::before {
  content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4;
  background-image:
    linear-gradient(to right, color-mix(in oklab, var(--beige-dark-deep) 34%, transparent) 1px, transparent 1px),
    linear-gradient(to bottom, color-mix(in oklab, var(--beige-dark-deep) 34%, transparent) 1px, transparent 1px);
  background-size: 46px 46px;
  -webkit-mask-image: radial-gradient(72% 64% at 50% 46%, transparent 38%, #000 100%);
  mask-image: radial-gradient(72% 64% at 50% 46%, transparent 38%, #000 100%);
}
.ck-cta > * { position: relative; z-index: 1; }

/* ============================================================
   Cluely-inspired layer: bolder hero type, animated gradient
   mesh, a scrolling marquee, big stat strips, and a blur-rise
   headline entrance. Adapted to the warm beige + plum palette.
   ============================================================ */

/* oversized, confident hero headline */
.ck-display-xl {
  font-size: clamp(2.6rem, 6.4vw, 5.2rem);
  line-height: 0.98; letter-spacing: -0.04em;
  font-weight: var(--fw-bold); color: var(--text-max);
  text-wrap: balance; margin: 0;
}
.ck-hero__sub {
  font-size: clamp(1.05rem, 1.6vw, 1.35rem); line-height: 1.5;
  color: var(--text-secondary); font-weight: var(--fw-medium); margin: 0;
}
/* gradient-filled keyword */
.ck-grad-text {
  background: linear-gradient(96deg, var(--accent), #d06a3f 55%, var(--accent-hover));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}

/* animated gradient mesh: soft drifting plum + warm blobs */
.ck-hero-mesh {
  position: absolute; inset: -20% -10% auto -10%; height: 150%; z-index: 0;
  pointer-events: none; filter: blur(46px); opacity: 0.5;
  background:
    radial-gradient(38% 50% at 22% 30%, color-mix(in oklab, var(--accent) 55%, transparent), transparent 70%),
    radial-gradient(34% 46% at 78% 24%, color-mix(in oklab, #e08a4e 50%, transparent), transparent 72%),

/* Reveal: content is always visible (end-state is the base state).
   IntersectionObserver fires a one-shot entrance animation when the
   element scrolls in, but a missed trigger never hides anything. */
function Reveal({ children, delay = 0, as = 'div', className = '', style }) {
  const ref = useRef(null);
  const [animate, setAnimate] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el || !('IntersectionObserver' in window)) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { setAnimate(true); io.disconnect(); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const Tag = as;
  return (
    <Tag ref={ref}
      className={`ck-reveal ${animate ? 'is-in' : ''} ${className}`}
      style={{ animationDelay: `${delay}ms`, ...style }}>
      {children}
    </Tag>
  );
}

/* BOT GLYPHS: bespoke inline SVG, drawn for this page (no icon libs). */
/* Same 24x24, stroke=currentColor, strokeWidth~1.75 idiom as Icon().  */
/* ------------------------------------------------------------------ */
function BotGlyph({ name, size = 20, stroke = 1.75, style }) {
  const paths = {
    /* player marker: a caret cursor sitting inside a slot. Identical for
       humans and bots (that sameness is the whole point of the hero). */
    marker:   <><rect x="4" y="4" width="16" height="16" rx="4"/><path d="M9.5 8.5l5 3.5-5 3.5z" strokeLinejoin="round"/></>,
    /* waypoint route: an evenly-dotted path with one hard 90° bend. */
    rails:    <><path d="M4 6h7v12" strokeLinecap="round" strokeDasharray="0.1 3"/><circle cx="11" cy="6" r="1.4" fill="currentColor" stroke="none"/></>,
    /* stopwatch dial: a needle pinned to one exact tick, with a snap bracket. */
    stopwatch:<><circle cx="12" cy="13" r="7"/><path d="M12 13l3.2-3.2" strokeLinecap="round"/><path d="M12 6V4M10.5 4h3" strokeLinecap="round"/><path d="M18 7l1-1" strokeLinecap="round"/></>,
    /* retention curve: a line stepping down to the right, last point open. */
    churn:    <><path d="M4 6v13h16" strokeLinecap="round"/><path d="M7 9h3v3h3v3h2.5" strokeLinecap="round" strokeLinejoin="round"/><circle cx="18.5" cy="15" r="1.3"/></>,
    /* plug + socket meeting: two facing bracket halves closing a 1px gap. */
    plug:     <><path d="M4 7v10M9 9.5v5" strokeLinecap="round"/><path d="M4 7h4M4 17h4" strokeLinecap="round"/><path d="M20 7v10M15 9.5v5" strokeLinecap="round"/><path d="M20 7h-4M20 17h-4" strokeLinecap="round"/></>,
    /* persona sliders: three rails, each with a knob at a different x. */
    sliders:  <><path d="M4 7h16M4 12h16M4 17h16" strokeLinecap="round"/><rect x="7" y="5.5" width="3" height="3" rx="0.8"/><rect x="13" y="10.5" width="3" height="3" rx="0.8"/><rect x="9" y="15.5" width="3" height="3" rx="0.8"/></>,
    /* live signal: a filled dot with two concentric broadcast arcs. */
    signal:   <><circle cx="12" cy="12" r="1.8" fill="currentColor" stroke="none"/><path d="M8.5 8.5a5 5 0 0 0 0 7M15.5 8.5a5 5 0 0 1 0 7" strokeLinecap="round"/></>,
    /* lobby grid: 2x4 slots, some empty, some filling in. */
    lobby:    <><rect x="3.5" y="6" width="6.5" height="5" rx="1.2"/><rect x="14" y="6" width="6.5" height="5" rx="1.2"/><rect x="3.5" y="13" width="6.5" height="5" rx="1.2"/><rect x="14" y="13" width="6.5" height="5" rx="1.2" fill="currentColor" fillOpacity="0.18"/></>,
    /* launch flag on a short mast: a "day one" mark. */
    launch:   <><path d="M7 4v16" strokeLinecap="round"/><path d="M7 5h9l-2.2 3L16 11H7z" strokeLinejoin="round"/></>,
    /* globe: one meridian arc and a highlighted region dot. */
    globe:    <><circle cx="12" cy="12" r="8"/><path d="M12 4c-3 2.4-3 13.6 0 16M12 4c3 2.4 3 13.6 0 16M4.5 9.5h15M4.5 14.5h15" strokeLinecap="round"/><circle cx="15.5" cy="9.5" r="1.5" fill="currentColor" stroke="none"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth={stroke} style={style} aria-hidden="true">
      {paths[name] || null}
    </svg>
  );
}

/* A small noisy polyline, deterministic per seed, for the micro-traces.
   Same noise character for humans and bots so the rows read identically. */
function tracePoints(seed, n, w, h) {
  let s = seed * 9301 + 49297;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const pts = [];
  for (let i = 0; i < n; i++) {
    const x = (i / (n - 1)) * w;
    const y = h / 2 + (rnd() - 0.5) * h * 0.82;
    pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
  }
  return pts.join(' ');
}

/* TRACE COMPARE: the solution's signature proof.                      */
/* Two stacked behavior-trace lanes (player vs. bot) sharing the same   */
/* statistical character. A faint plum playhead sweeps across.          */
/* ------------------------------------------------------------------ */
function TraceLane({ label, seed, accent }) {
  const W = 360, H = 90;
  const pts = tracePoints(seed, 13, W, H).split(' ').map((p) => p.split(',').map(Number));
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  /* a couple of "decision point" markers along the path */
  const marks = [pts[3], pts[7], pts[10]];
  return (
    <div style={{ position: 'relative', padding: '12px 14px' }}>
      <span className="ck-mono" style={{
        position: 'absolute', top: 10, left: 14, zIndex: 2,
        fontSize: 'var(--fs-micro)', letterSpacing: 'var(--tracking-caps)',
        textTransform: 'uppercase', color: accent,
      }}>{label}</span>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="92" fill="none"
        preserveAspectRatio="none" aria-hidden="true" style={{ display: 'block' }}>
        {/* instrument gridlines */}
        {[0.25, 0.5, 0.75].map((g) => (
          <line key={g} x1="0" y1={H * g} x2={W} y2={H * g}
            stroke="var(--border-hairline)" strokeWidth="1" />
        ))}
        {[0.25, 0.5, 0.75].map((g) => (
          <line key={'v' + g} x1={W * g} y1="0" x2={W * g} y2={H}
            stroke="var(--border-hairline)" strokeWidth="1" />
        ))}
        <path d={d} stroke={accent} strokeWidth="1.5"
          strokeLinecap="round" strokeLinejoin="round" />
        {marks.map((m, i) => (
          <circle key={i} cx={m[0]} cy={m[1]} r="2.2" fill="var(--surface-inset)"
            stroke={accent} strokeWidth="1.25" />
        ))}
      </svg>
    </div>
  );
}

   '#/ai-bots' → the bots page; any other '#/...' → home; a plain

function parseRoute(hash) {
  if (hash === '#/ai-bots') return 'aibots';
  if (hash === '#/waitlist') return 'waitlist';
  if (hash.indexOf('#/') === 0) return 'home';

}

      <FooterBots />
    </React.Fragment>

}

function App() {
  const [view, setView] = useState(() => parseRoute(window.location.hash) || 'home');

  useEffect(() => {
    const onHashChange = () => {
      const r = parseRoute(window.location.hash);
      if (r) setView(r);
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  useEffect(() => { window.scrollTo(0, 0); }, [view]);

  const page = view === 'aibots'   ? <BotsApp view={view} />
             : view === 'waitlist' ? <WaitlistApp view={view} />
             : <HomeApp view={view} />;

  return (
    <React.Fragment>
      <div className="ck-scroll-progress" aria-hidden="true"></div>
      {page}
    </React.Fragment>
  );
}

<!-- ============================================================
     Hero ambient ragdoll backdrop
     A faded, interactive crash-test-dummy (the same skinned model +
     cannon-es ragdoll as crash-dummy.html) rendered transparently
     behind the hero copy. Aim-based bone driving keeps the skinned
     mesh from corkscrewing; pose/limit velocity-servos hold a neutral
     stance; cursor sweeps over the hero knock it around. The canvas is
     pointer-events:none. Cursor motion is read at the window level so
     buttons, links and text selection are never blocked.
     ============================================================ -->
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const MODEL_URL = 'crash-dummy/crush_dummy.glb';
const TEX_BASE  = 'crash-dummy/textures/crush_dummy_default_';
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;

// (Re)create the hero dummy whenever the home view mounts its #splash-dummy
// container, and tear it down when navigation removes it. This is what makes
// the ragdoll come back after you visit another page and return home, instead
// of leaving an empty slot (the container is a fresh DOM node each remount).
let dummyInstance = null; // { el, stop }
function syncHeroDummy() {
  const el = document.getElementById('splash-dummy');
  if (el) {
    if (dummyInstance && dummyInstance.el === el) return; // already running on this node
    if (dummyInstance) { try { dummyInstance.stop(); } catch (e) {} dummyInstance = null; }
    try { dummyInstance = { el, stop: startHeroDummy(el) }; }
    catch (e) { console.error('hero dummy failed', e); }
  } else if (dummyInstance) {
    try { dummyInstance.stop(); } catch (e) {}
    dummyInstance = null;
  }
}
// React adds/removes the container deep inside #root, so watch the subtree.
new MutationObserver(syncHeroDummy).observe(document.body, { childList: true, subtree: true });
// Initial boot: retry briefly (setTimeout, not rAF) until React has mounted.
(function boot(tries) {
  syncHeroDummy();
  if (!dummyInstance && tries > 0) setTimeout(() => boot(tries - 1), 50);
})(200);

function startHeroDummy(container) {

    const mag = Math.min(cursorSpeed, SPEED_CLAMP) * IMPULSE_K;
    const impulse = new CANNON.Vec3(dir.x * mag, dir.y * mag, dir.z * mag);
    const rel = new CANNON.Vec3(hits[0].point.x - body.position.x, hits[0].point.y - body.position.y, hits[0].point.z - body.position.z);
    body.applyImpulse(impulse, rel);
    const dO = body.invInertiaWorld.vmult(rel.cross(impulse)), av = body.angularVelocity;
    av.x += dO.x * SPIN; av.y += dO.y * SPIN; av.z += dO.z * SPIN;
    const wl = Math.hypot(av.x, av.y, av.z); if (wl > SPIN_MAXW) { const k = SPIN_MAXW / wl; av.x *= k; av.y *= k; av.z *= k; }
    moveX = 0; moveY = 0; cursorSpeed = 0;
  }

  // ---- loop ----
  const clock = new THREE.Clock(), FIXED = 1 / 60; let acc = 0;
  function animate() {
    if (!running) return;
    requestAnimationFrame(animate);
    let dt = clock.getDelta(); if (dt > 0.1) dt = 0.1;
    tryStrike();
    acc += dt; let steps = 0;
    while (acc >= FIXED && steps < 5) { applyPoseControllers(); applyJointLimits(); world.step(FIXED); acc -= FIXED; steps++; }
    for (const name in proxByName) { const b = bodies[name], pm = proxByName[name]; pm.position.set(b.position.x, b.position.y, b.position.z); pm.quaternion.set(b.quaternion.x, b.quaternion.y, b.quaternion.z, b.quaternion.w); }
    driveBones();
    renderer.render(scene, camera);
  }

  // Teardown so the dummy can be cleanly re-created when the home view
  // remounts its container (navigating away and back).
  return function stop() {
    running = false;
    try { ro.disconnect(); } catch (e) {}
    try { window.removeEventListener('mousemove', onMouseMove); } catch (e) {}
    try { renderer.dispose(); } catch (e) {}
    const c = renderer.domElement; if (c && c.parentNode) c.parentNode.removeChild(c);
  };
}
</script>
</body>
</html>
