<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crash Test Dummy — Ragdoll Impact Lab</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #fff; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; cursor: crosshair; }

  /* ---- Lab readout HUD ---- */
  #hud {
    position: fixed; top: 18px; left: 18px; z-index: 10;
    font-family: "SFMono-Regular", ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
    background: #0d1411;
    border: 1px solid #1f2d27;
    border-radius: 10px;
    padding: 14px 16px;
    width: 232px; max-width: 46vw;
    color: #57f5b5;
    box-shadow: 0 8px 30px rgba(0,0,0,.18), inset 0 0 0 1px rgba(87,245,181,.06);
    user-select: none;
    pointer-events: none; /* never intercept cursor strikes */
  }
  #hud .title {
    font-size: 10px; letter-spacing: .22em; color: #3a7d63;
    text-transform: uppercase; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  #hud .title .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #57f5b5; box-shadow: 0 0 8px #57f5b5;
    animation: blink 1.4s steps(2, jump-none) infinite;
  }
  @keyframes blink { 50% { opacity: .25; } }
  #hud .row { display: flex; justify-content: space-between; align-items: baseline; margin: 5px 0; }
  #hud .row .k { font-size: 10px; letter-spacing: .12em; color: #4f9e80; text-transform: uppercase; }
  #hud .row .v { font-size: 18px; font-variant-numeric: tabular-nums; text-shadow: 0 0 10px rgba(87,245,181,.35); }
  #hud .v.small { font-size: 13px; color: #9bf0cf; }
  #hud .bar { height: 6px; border-radius: 3px; background: #16241d; margin-top: 10px; overflow: hidden; }
  #hud .bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#57f5b5,#f7d046); transition: width .08s linear; }
  #hud .hint { margin-top: 11px; font-size: 9.5px; letter-spacing: .08em; color: #2f6b53; line-height: 1.5; }
  #peakflash { color: #f7d046 !important; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, monospace; color: #4f9e80; letter-spacing: .18em;
    font-size: 12px; text-transform: uppercase; background: #fff; z-index: 20;
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">Loading crash-test dummy…</div>

<div id="hud">
  <div class="title"><span class="dot"></span>Impact Telemetry</div>
  <div class="row"><span class="k">Total Impact</span><span class="v" id="total">0.0</span></div>
  <div class="row"><span class="k">Last Hit</span><span class="v small" id="last">— N·s</span></div>
  <div class="row"><span class="k">Cursor Vel</span><span class="v small" id="cvel">0 px/f</span></div>
  <div class="row"><span class="k">Target</span><span class="v small" id="target">none</span></div>
  <div class="bar"><i id="bar"></i></div>
  <div class="hint">Sweep the cursor through the dummy to strike it.<br/>Faster sweeps hit harder. Drag-rotate disabled — pure impact mode.</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ============================================================
   Crash Test Dummy — ragdoll impact simulation
   ------------------------------------------------------------
   A textured, skinned crash-test-dummy model (UE4 mannequin
   skeleton, converted from the source FBX to glTF) is driven by
   a cannon-es physics ragdoll. The ragdoll is *built from the
   model's own bind-pose skeleton*, so every physics joint sits
   exactly on the corresponding model joint. Each frame the
   model's bones are slaved to their physics body, so the mesh
   deforms with the ragdoll.

   Active "muscle" velocity-servos hold a neutral standing pose;
   cursor sweeps cast a ray (against invisible per-body proxy
   colliders) and punch impulses into body parts.

   STABILITY INVARIANT (unchanged from the primitive version):
   pose/limit restoration is done as *bounded velocity edits*,
   never unbounded torque — that is what keeps it NaN-stable
   across every segment inertia. Self-collision between limbs is
   off (they collide only with the floor) for stability + 60fps.
   ============================================================ */

// ---------------------------------------------------------------
// Renderer / scene / camera
// ---------------------------------------------------------------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.Fog(0xffffff, 9, 24);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
const camTarget = new THREE.Vector3(0, 0.92, 0);
const camDir = new THREE.Vector3(0.5, 0.16, 1).normalize(); // 3/4 view
// Frame the whole ~1.7m figure (with arm span) regardless of viewport aspect.
function frameCamera() {
  const H = 2.0, W = 1.4, margin = 1.12;
  const vfov = THREE.MathUtils.degToRad(camera.fov);
  const distH = (H * margin / 2) / Math.tan(vfov / 2);
  const hfov = 2 * Math.atan(Math.tan(vfov / 2) * camera.aspect);
  const distW = (W * margin / 2) / Math.tan(hfov / 2);
  const dist = Math.max(distH, distW);
  camera.position.copy(camTarget).addScaledVector(camDir, dist);
  camera.lookAt(camTarget);
}
frameCamera();

// ---------------------------------------------------------------
// Lighting — soft ambient + one directional key light w/ shadows
// ---------------------------------------------------------------
scene.add(new THREE.HemisphereLight(0xffffff, 0xdfe3e8, 0.85));
scene.add(new THREE.AmbientLight(0xffffff, 0.30));

const key = new THREE.DirectionalLight(0xffffff, 2.2);
key.position.set(4.5, 8.5, 5.0);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1;
key.shadow.camera.far = 25;
key.shadow.camera.left = -3; key.shadow.camera.right = 3;
key.shadow.camera.top = 4;  key.shadow.camera.bottom = -1;
key.shadow.bias = -0.0004;
key.shadow.radius = 4;
scene.add(key);

// ---------------------------------------------------------------
// Sterile testing-room floor + subtle grid
// ---------------------------------------------------------------
const floorMat = new THREE.MeshStandardMaterial({ color: 0xf4f5f6, roughness: 0.95, metalness: 0.0 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const grid = new THREE.GridHelper(40, 80, 0xc7ccd1, 0xe4e7ea);
grid.material.transparent = true;
grid.material.opacity = 0.55;
grid.position.y = 0.002;
scene.add(grid);

// ---------------------------------------------------------------
// Physics world
// ---------------------------------------------------------------
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.solver.iterations = 22;
world.solver.tolerance = 0.0008;
world.allowSleep = false;

const G_GROUND = 1, G_DUMMY = 2;

// static floor collider so crumpled limbs can rest on the ground
const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), collisionFilterGroup: G_GROUND, collisionFilterMask: G_DUMMY });
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);

const dummyMat = new CANNON.Material('dummy');
world.addContactMaterial(new CANNON.ContactMaterial(dummyMat, dummyMat, { friction: 0.6, restitution: 0.04 }));

// ---------------------------------------------------------------
// Shared simulation state (filled in by build(), below, once the
// model has loaded and we know the skeleton's bind-pose joints)
// ---------------------------------------------------------------
const bodies = {};      // name -> CANNON.Body
const restQuats = {};   // name -> THREE.Quaternion (neutral pose target)
const restPos = {};     // name -> CANNON.Vec3 (neutral standing position)
const proxByName = {};  // name -> THREE.Mesh (invisible collider proxy, synced to body)
const pickMeshes = [];  // proxy meshes used for raycasting (carry .userData.bodyName)
const jointLimits = []; // { A, B, restRel:THREE.Quaternion, cone }
const jointByPivot = {}; // pivot bone name -> { A, B, pa:CANNON.Vec3(local), pb:CANNON.Vec3(local) }
const aims = [];        // aim-driving entries (see build()/driveBones)
const rootDrive = {};   // { bone, offset:Matrix4 } for the pelvis root bone
let rootBone = null, rootParentWorld = new THREE.Matrix4();
let started = false;

// ---------------------------------------------------------------
// Load the model, wire up its PBR textures, then build the ragdoll
// from its bind skeleton.
// ---------------------------------------------------------------
const MODEL_URL = 'crash-dummy/crush_dummy.glb';
const TEX_BASE  = 'crash-dummy/textures/crush_dummy_default_';

new GLTFLoader().load(MODEL_URL, (gltf) => {
  const model = gltf.scene;
  scene.add(model);

  const skinned = model.getObjectByProperty('isSkinnedMesh', true);
  skinned.castShadow = true;
  skinned.receiveShadow = true;
  skinned.frustumCulled = false; // bones leave the original bounds once it ragdolls

  // ---- PBR textures (the GLB shipped without usable maps) ----
  const tl = new THREE.TextureLoader();
  function tex(name, srgb) {
    const t = tl.load(TEX_BASE + name);
    t.flipY = false;                 // glTF UV convention
    if (srgb) t.colorSpace = THREE.SRGBColorSpace;
    return t;
  }
  const mat = Array.isArray(skinned.material) ? skinned.material[0] : skinned.material;
  mat.map          = tex('BaseColor.tga.png', true);
  mat.normalMap    = tex('Normal.tga.png', false);
  mat.roughnessMap = tex('Roughness.tga.png', false); mat.roughness = 1.0;
  mat.metalnessMap = tex('Metallic.tga.png', false);  mat.metalness = 1.0;
  mat.aoMap        = tex('Occlusion.tga.png', false);
  mat.emissiveMap  = tex('Emissive.tga.png', true);   mat.emissive = new THREE.Color(0xffffff); mat.emissiveIntensity = 1.0;
  mat.needsUpdate = true;
  // aoMap samples the 2nd UV set in three; reuse the primary UVs.
  const geo = skinned.geometry;
  if (geo.attributes.uv && !geo.attributes.uv2) geo.setAttribute('uv2', geo.attributes.uv);

  build(model, skinned);

  document.getElementById('loading').remove();
  started = true;
  animate();
}, undefined, (err) => {
  document.getElementById('loading').textContent = 'Failed to load model — see console';
  console.error('Model load failed:', err);
});

// ---------------------------------------------------------------
// Build the ragdoll from the model's bind-pose skeleton
// ---------------------------------------------------------------
const ONE = new THREE.Vector3(1, 1, 1);
const Y_AXIS = new THREE.Vector3(0, 1, 0);

function build(model, skinned) {
  model.updateMatrixWorld(true);
  const boneByName = {};
  skinned.skeleton.bones.forEach((b) => { boneByName[b.name] = b; });
  rootBone = boneByName['root'] || skinned.skeleton.bones[0];
  rootBone.parent.updateWorldMatrix(true, false);
  rootParentWorld.copy(rootBone.parent.matrixWorld);

  const P = (n) => boneByName[n].getWorldPosition(new THREE.Vector3());
  const quatAlong = (dir) => new THREE.Quaternion().setFromUnitVectors(Y_AXIS, dir.clone().normalize());

  // Each def: physics body + which model bone it drives.
  // Limb bodies are boxes whose local +Y runs down the segment between
  // its two joints; torso/head are placed explicitly.
  const defs = [];
  const limb = (name, bone, a, b, r, mass) => {
    const c = a.clone().add(b).multiplyScalar(0.5);
    const d = b.clone().sub(a);
    defs.push({ name, bone, kind: 'box', he: [r, d.length() / 2, r], center: c, quat: quatAlong(d), mass });
  };
  const handBody = (name, bone, wrist, fromElbow, mass) => {
    const d = wrist.clone().sub(fromElbow);
    const c = wrist.clone().add(d.clone().normalize().multiplyScalar(0.05));
    defs.push({ name, bone, kind: 'box', he: [0.05, 0.06, 0.03], center: c, quat: quatAlong(d), mass });
  };

  // --- torso / head ---
  defs.push({ name: 'pelvis', bone: 'pelvis', kind: 'box', he: [0.135, 0.11, 0.115],
              center: P('pelvis').add(new THREE.Vector3(0, 0.02, 0)), quat: new THREE.Quaternion(), mass: 12 });
  {
    const a = P('spine_01'), b = P('neck_01');
    const c = a.clone().add(b).multiplyScalar(0.5), d = b.clone().sub(a);
    defs.push({ name: 'chest', bone: 'spine_03', kind: 'box', he: [0.17, d.length() / 2, 0.12],
                center: c, quat: quatAlong(d), mass: 16 });
  }
  defs.push({ name: 'head', bone: 'head', kind: 'sphere', r: 0.12,
              center: P('head').add(new THREE.Vector3(0, 0.07, 0)), quat: new THREE.Quaternion(), mass: 5 });

  // --- arms ---
  limb('upperArmL', 'upperarm_l', P('upperarm_l'), P('lowerarm_l'), 0.050, 3);
  limb('lowerArmL', 'lowerarm_l', P('lowerarm_l'), P('hand_l'),     0.045, 2);
  handBody('handL', 'hand_l', P('hand_l'), P('lowerarm_l'), 0.6);
  limb('upperArmR', 'upperarm_r', P('upperarm_r'), P('lowerarm_r'), 0.050, 3);
  limb('lowerArmR', 'lowerarm_r', P('lowerarm_r'), P('hand_r'),     0.045, 2);
  handBody('handR', 'hand_r', P('hand_r'), P('lowerarm_r'), 0.6);

  // --- legs (feet pinned = static anchors) ---
  limb('upperLegL', 'thigh_l', P('thigh_l'), P('calf_l'), 0.085, 7);
  limb('lowerLegL', 'calf_l',  P('calf_l'),  P('foot_l'), 0.065, 5);
  {
    const a = P('foot_l'), b = P('ball_l');
    const c = a.clone().add(b).multiplyScalar(0.5), d = b.clone().sub(a);
    defs.push({ name: 'footL', bone: 'foot_l', kind: 'box', he: [0.06, 0.05, 0.10], center: c, quat: quatAlong(d), mass: 1, pinned: true });
  }
  limb('upperLegR', 'thigh_r', P('thigh_r'), P('calf_r'), 0.085, 7);
  limb('lowerLegR', 'calf_r',  P('calf_r'),  P('foot_r'), 0.065, 5);
  {
    const a = P('foot_r'), b = P('ball_r');
    const c = a.clone().add(b).multiplyScalar(0.5), d = b.clone().sub(a);
    defs.push({ name: 'footR', bone: 'foot_r', kind: 'box', he: [0.06, 0.05, 0.10], center: c, quat: quatAlong(d), mass: 1, pinned: true });
  }

  // joints: [bodyA, bodyB, pivotBone, coneAngle, twistAngle]
  const JDEF = [
    ['pelvis', 'chest',      'spine_01',   0.40, 0.35], // spine
    ['chest',  'head',       'neck_01',    0.55, 0.45], // neck
    ['chest',  'upperArmL',  'upperarm_l', 1.30, 0.65], // shoulder
    ['upperArmL', 'lowerArmL', 'lowerarm_l', 1.15, 0.30], // elbow
    ['lowerArmL', 'handL',   'hand_l',     0.50, 0.30], // wrist
    ['chest',  'upperArmR',  'upperarm_r', 1.30, 0.65],
    ['upperArmR', 'lowerArmR', 'lowerarm_r', 1.15, 0.30],
    ['lowerArmR', 'handR',   'hand_r',     0.50, 0.30],
    ['pelvis', 'upperLegL',  'thigh_l',    1.00, 0.40], // hip
    ['upperLegL', 'lowerLegL', 'calf_l',   1.05, 0.25], // knee
    ['lowerLegL', 'footL',   'foot_l',     0.40, 0.25], // ankle
    ['pelvis', 'upperLegR',  'thigh_r',    1.00, 0.40],
    ['upperLegR', 'lowerLegR', 'calf_r',   1.05, 0.25],
    ['lowerLegR', 'footR',   'foot_r',     0.40, 0.25],
  ];

  // invisible-but-raycastable proxy material (geometry-based picking
  // ignores material opacity, so opacity:0 hides it yet still hits)
  const proxyMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false });

  for (const d of defs) {
    let shape, proxyGeo;
    if (d.kind === 'sphere') {
      shape = new CANNON.Sphere(d.r);
      proxyGeo = new THREE.SphereGeometry(d.r, 14, 12);
    } else {
      shape = new CANNON.Box(new CANNON.Vec3(d.he[0], d.he[1], d.he[2]));
      proxyGeo = new THREE.BoxGeometry(d.he[0] * 2, d.he[1] * 2, d.he[2] * 2);
    }
    const body = new CANNON.Body({
      mass: d.pinned ? 0 : d.mass,
      material: dummyMat,
      position: new CANNON.Vec3(d.center.x, d.center.y, d.center.z),
      quaternion: new CANNON.Quaternion(d.quat.x, d.quat.y, d.quat.z, d.quat.w),
      linearDamping: 0.12,
      angularDamping: 0.35,
      collisionFilterGroup: G_DUMMY,
      collisionFilterMask: G_GROUND, // self-collision off for stability + 60fps
    });
    body.addShape(shape);
    body.userData = { pinned: !!d.pinned, mass: d.mass };
    world.addBody(body);
    bodies[d.name] = body;
    restQuats[d.name] = new THREE.Quaternion(d.quat.x, d.quat.y, d.quat.z, d.quat.w);
    restPos[d.name] = new CANNON.Vec3(d.center.x, d.center.y, d.center.z);

    const pm = new THREE.Mesh(proxyGeo, proxyMat);
    pm.userData.bodyName = d.name;
    scene.add(pm);
    proxByName[d.name] = pm;
    pickMeshes.push(pm);

  }

  // Joints — PointToPoint ball joints. Pivots must be expressed in each
  // body's LOCAL frame; since bodies carry a non-identity rest orientation
  // we derive them with pointToLocalFrame (a bare world offset would be
  // wrong and would misplace the joint). ROM limits are one-sided angular
  // springs in applyJointLimits(): free inside the cone, resisting beyond.
  for (const [aName, bName, pivotBone, cone] of JDEF) {
    const A = bodies[aName], B = bodies[bName];
    const pv = P(pivotBone);
    const pivW = new CANNON.Vec3(pv.x, pv.y, pv.z);
    const pa = A.pointToLocalFrame(pivW, new CANNON.Vec3());
    const pb = B.pointToLocalFrame(pivW, new CANNON.Vec3());
    const c = new CANNON.PointToPointConstraint(A, pa, B, pb, 1e6);
    c.collideConnected = false;
    world.addConstraint(c);
    jointByPivot[pivotBone] = { A, B, pa, pb };

    const qA = new THREE.Quaternion(A.quaternion.x, A.quaternion.y, A.quaternion.z, A.quaternion.w);
    const qB = new THREE.Quaternion(B.quaternion.x, B.quaternion.y, B.quaternion.z, B.quaternion.w);
    jointLimits.push({ A, B, restRel: qA.clone().invert().multiply(qB), cone });
  }

  // ---- Bone-driving setup (aim-based, position-sourced) ----
  // The pelvis (root) is driven rigidly from the pelvis body. Every other
  // bone is AIMED: rotate its bind orientation by the minimal swing that
  // carries its bind segment direction onto its current segment direction,
  // where directions come from physics JOINT positions. The constraints pin
  // those joint points in world space no matter how a body spins, so this is
  // immune to the free-twist/flip that wrecked an orientation-copy approach.
  // Minimal-swing introduces no roll → the skinned mesh never corkscrews.
  model.updateMatrixWorld(true);
  rootBone = boneByName['root'] || skinned.skeleton.bones[0];
  rootBone.parent.updateWorldMatrix(true, false);
  rootParentWorld.copy(rootBone.parent.matrixWorld);

  const pelvisBone = boneByName['pelvis'];
  pelvisBone.updateWorldMatrix(true, false);
  const pelvisRest = new THREE.Matrix4().compose(
    new THREE.Vector3(bodies.pelvis.position.x, bodies.pelvis.position.y, bodies.pelvis.position.z),
    restQuats.pelvis, ONE);
  rootDrive.bone = pelvisBone;
  rootDrive.offset = new THREE.Matrix4().copy(pelvisRest).invert().multiply(pelvisBone.matrixWorld);

  // a direction endpoint: a joint pivot (preferred, stable) or a body centre
  const srcBind = (spec) => spec.joint ? P(spec.joint)
    : (() => { const b = bodies[spec.body]; return new THREE.Vector3(b.position.x, b.position.y, b.position.z); })();
  // [bone, fromPoint, toPoint]  (segment direction = from → to)
  const AIM = [
    ['spine_03', { joint: 'spine_01' }, { joint: 'neck_01' }],
    ['head',     { joint: 'neck_01' },  { body: 'head' }],
    ['upperarm_l', { joint: 'upperarm_l' }, { joint: 'lowerarm_l' }],
    ['lowerarm_l', { joint: 'lowerarm_l' }, { joint: 'hand_l' }],
    ['hand_l',     { joint: 'hand_l' },     { body: 'handL' }],
    ['upperarm_r', { joint: 'upperarm_r' }, { joint: 'lowerarm_r' }],
    ['lowerarm_r', { joint: 'lowerarm_r' }, { joint: 'hand_r' }],
    ['hand_r',     { joint: 'hand_r' },     { body: 'handR' }],
    ['thigh_l', { joint: 'thigh_l' }, { joint: 'calf_l' }],
    ['calf_l',  { joint: 'calf_l' },  { joint: 'foot_l' }],
    ['foot_l',  { joint: 'foot_l' },  { body: 'footL' }],
    ['thigh_r', { joint: 'thigh_r' }, { joint: 'calf_r' }],
    ['calf_r',  { joint: 'calf_r' },  { joint: 'foot_r' }],
    ['foot_r',  { joint: 'foot_r' },  { body: 'footR' }],
  ];
  for (const [boneName, fromS, toS] of AIM) {
    const bone = boneByName[boneName];
    bone.updateWorldMatrix(true, false);
    const bindQuat = new THREE.Quaternion().setFromRotationMatrix(bone.matrixWorld);
    const bindDir = srcBind(toS).sub(srcBind(fromS)).normalize();
    aims.push({ bone, from: fromS, to: toS, bindDir, bindQuat });
  }
}

// ---------------------------------------------------------------
// One-sided ROM limit via bounded relative-velocity correction:
// inside the cone the joint is free; past it we drive the relative
// angular velocity inward (and brake outward motion), split evenly.
// ---------------------------------------------------------------
const _qA = new THREE.Quaternion(), _qB = new THREE.Quaternion();
const _rel = new THREE.Quaternion(), _delta = new THREE.Quaternion();
const _axis = new THREE.Vector3();
// Tunable gains (grouped so they can be swept live via window.__sim.TUNE).
const TUNE = {
  limRate: 9.0,    // commanded inward rad/s per rad past a joint limit
  limBlend: 0.5,   // how aggressively we pull back toward the cone
  poseRate: 14.0,  // commanded rad/s per rad of orientation error
  poseMaxW: 20.0,  // cap on commanded angular rate
  poseBlend: 0.45, // fraction of the angular gap closed per substep
  linRate: 12.0,   // commanded m/s per metre of offset
  linMaxV: 9.0,    // cap on commanded linear speed
  linBlend: 0.3,   // fraction of the linear-velocity gap closed per substep
};
function applyJointLimits() {
  for (const j of jointLimits) {
    const A = j.A, B = j.B;
    _qA.set(A.quaternion.x, A.quaternion.y, A.quaternion.z, A.quaternion.w);
    _qB.set(B.quaternion.x, B.quaternion.y, B.quaternion.z, B.quaternion.w);
    _rel.copy(_qA).invert().multiply(_qB);            // B in A frame
    _delta.copy(j.restRel).invert().multiply(_rel);   // deviation from rest
    let w = _delta.w;
    if (w < 0) { _delta.x *= -1; _delta.y *= -1; _delta.z *= -1; w = -w; }
    w = Math.min(1, Math.max(-1, w));
    const angle = 2 * Math.acos(w);                   // unsigned swing+twist
    if (angle <= j.cone) continue;                    // inside ROM → free

    const s = Math.sqrt(1 - w * w);
    if (s < 1e-5) continue;
    _axis.set(_delta.x / s, _delta.y / s, _delta.z / s); // axis in A's frame
    _axis.applyQuaternion(_qA);                          // → world (+axis = "further out")

    const over = angle - j.cone;
    const curAlong =
      (B.angularVelocity.x - A.angularVelocity.x) * _axis.x +
      (B.angularVelocity.y - A.angularVelocity.y) * _axis.y +
      (B.angularVelocity.z - A.angularVelocity.z) * _axis.z;
    const desiredAlong = -over * TUNE.limRate;        // command inward motion
    const corr = (desiredAlong - curAlong) * TUNE.limBlend * 0.5; // half to each body
    B.angularVelocity.x += _axis.x * corr; B.angularVelocity.y += _axis.y * corr; B.angularVelocity.z += _axis.z * corr;
    A.angularVelocity.x -= _axis.x * corr; A.angularVelocity.y -= _axis.y * corr; A.angularVelocity.z -= _axis.z * corr;
  }
}

// ---------------------------------------------------------------
// Active "muscle" velocity-servos — restore the neutral standing
// pose. Each substep we nudge a segment's angular *and* linear
// velocity toward the rotation/position that restores its neutral
// state, with capped command rates and a soft blend. Bounded
// velocity edits = unconditionally stable regardless of inertia.
// ---------------------------------------------------------------
const _cur = new THREE.Quaternion();
const _errq = new THREE.Quaternion();
function applyPoseControllers() {
  for (const [name, body] of Object.entries(bodies)) {
    if (body.userData.pinned) continue;
    _cur.set(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
    _errq.copy(restQuats[name]).multiply(_cur.invert()); // rest * cur^-1 maps current -> neutral
    if (_errq.w < 0) { _errq.x *= -1; _errq.y *= -1; _errq.z *= -1; _errq.w *= -1; }
    const w = Math.min(1, Math.max(-1, _errq.w));
    const angle = 2 * Math.acos(w);
    if (angle >= 1e-4) {
      const s = Math.sqrt(1 - w * w);
      if (s >= 1e-5) {
        const ax = _errq.x / s, ay = _errq.y / s, az = _errq.z / s;
        const cmd = Math.min(angle * TUNE.poseRate, TUNE.poseMaxW);
        const av = body.angularVelocity;
        av.x += (ax * cmd - av.x) * TUNE.poseBlend;
        av.y += (ay * cmd - av.y) * TUNE.poseBlend;
        av.z += (az * cmd - av.z) * TUNE.poseBlend;
      }
    }

    // --- linear servo: softly hold the standing silhouette ---
    const rp = restPos[name], cp = body.position, lv = body.velocity;
    const ex = rp.x - cp.x, ey = rp.y - cp.y, ez = rp.z - cp.z;
    const d = Math.sqrt(ex * ex + ey * ey + ez * ez);
    if (d > 1e-4) {
      let vcmd = d * TUNE.linRate;
      if (vcmd > TUNE.linMaxV) vcmd = TUNE.linMaxV;
      const inv = vcmd / d;
      lv.x += (ex * inv - lv.x) * TUNE.linBlend;
      lv.y += (ey * inv - lv.y) * TUNE.linBlend;
      lv.z += (ez * inv - lv.z) * TUNE.linBlend;
    } else {
      lv.x += (0 - lv.x) * TUNE.linBlend;
      lv.y += (0 - lv.y) * TUNE.linBlend;
      lv.z += (0 - lv.z) * TUNE.linBlend;
    }
  }
}

// ---------------------------------------------------------------
// Slave the model's bones to the physics ragdoll (aim-based).
//   • pelvis (root): driven rigidly from the pelvis body.
//   • every other mapped bone: rotate its bind orientation by the minimal
//     swing from its bind segment direction to its current one, where
//     directions are read from physics JOINT positions (constraint-pinned,
//     so spin/flip-proof). Bone positions stay bind-local off the parent,
//     so bone lengths stay rigid and the mesh holds together.
// Unmapped bones (spine_01/02, clavicles, neck_01, fingers, toes) keep
// their bind-local transform and ride along with their driven parent.
// ---------------------------------------------------------------
const _ja = new CANNON.Vec3(), _jb = new CANNON.Vec3();
function jointWorld(name, out) {
  const j = jointByPivot[name];
  j.A.pointToWorldFrame(j.pa, _ja);
  j.B.pointToWorldFrame(j.pb, _jb);
  return out.set((_ja.x + _jb.x) * 0.5, (_ja.y + _jb.y) * 0.5, (_ja.z + _jb.z) * 0.5);
}
function srcWorld(spec, out) {
  if (spec.joint) return jointWorld(spec.joint, out);
  const b = bodies[spec.body];
  return out.set(b.position.x, b.position.y, b.position.z);
}

const _rootM = new THREE.Matrix4(), _rootV = new THREE.Vector3(), _rootQ = new THREE.Quaternion();
const desiredRoot = new THREE.Matrix4();
const aimQuat = {}; // bone name -> THREE.Quaternion (desired world orientation)
const _pFrom = new THREE.Vector3(), _pTo = new THREE.Vector3(), _curDir = new THREE.Vector3();
const _swing = new THREE.Quaternion();
const _parentQ = new THREE.Quaternion(), _localQ = new THREE.Quaternion();
const _childW = new THREE.Matrix4();

function driveDFS(bone, parentWorld) {
  let world;
  if (bone === rootDrive.bone) {
    _childW.copy(parentWorld).invert().multiply(desiredRoot); // local = parent^-1 * desiredRoot
    _childW.decompose(bone.position, bone.quaternion, bone.scale);
    world = desiredRoot;                                 // children hang off the driven root
  } else if (aimQuat[bone.name]) {
    _parentQ.setFromRotationMatrix(parentWorld);
    _localQ.copy(_parentQ).invert().multiply(aimQuat[bone.name]); // local = parent^-1 * desiredWorld
    bone.quaternion.copy(_localQ);                       // position stays bind-local
    bone.updateMatrix();
    world = new THREE.Matrix4().multiplyMatrices(parentWorld, bone.matrix);
  } else {
    bone.updateMatrix();                                 // bind-local (never modified)
    world = new THREE.Matrix4().multiplyMatrices(parentWorld, bone.matrix);
  }
  const children = bone.children;
  for (let i = 0; i < children.length; i++) {
    if (children[i].isBone) driveDFS(children[i], world);
  }
}

function driveBones() {
  // root from pelvis body
  const pb = bodies.pelvis;
  _rootV.set(pb.position.x, pb.position.y, pb.position.z);
  _rootQ.set(pb.quaternion.x, pb.quaternion.y, pb.quaternion.z, pb.quaternion.w);
  _rootM.compose(_rootV, _rootQ, ONE);
  desiredRoot.multiplyMatrices(_rootM, rootDrive.offset);
  // aim every other mapped bone from current joint directions
  for (const a of aims) {
    srcWorld(a.from, _pFrom);
    srcWorld(a.to, _pTo);
    _curDir.copy(_pTo).sub(_pFrom);
    if (_curDir.lengthSq() < 1e-10) continue;
    _curDir.normalize();
    _swing.setFromUnitVectors(a.bindDir, _curDir);
    (aimQuat[a.bone.name] || (aimQuat[a.bone.name] = new THREE.Quaternion()))
      .copy(_swing).multiply(a.bindQuat);
  }
  driveDFS(rootBone, rootParentWorld);
}

// ---------------------------------------------------------------
// Cursor → raycast (against proxy colliders) → impulse
// ---------------------------------------------------------------
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2(-2, -2); // offscreen until first move
let haveCursor = false;
let moveX = 0, moveY = 0, cursorSpeed = 0;
let hoverName = null;

const IMPULSE_K = 0.16;       // px/frame -> impulse magnitude
const SPEED_CLAMP = 90;       // cap runaway flicks
const SPIN = 2.8;             // extra rotational kick on contact
const SPIN_MAXW = 26;         // clamp so a hard flick can't fling a limb to NaN-speed
let totalImpact = 0;
let lastHit = 0;
let peakBar = 0;

renderer.domElement.addEventListener('mousemove', (e) => {
  const r = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  moveX = e.movementX || 0;
  moveY = e.movementY || 0;
  cursorSpeed = Math.sqrt(moveX * moveX + moveY * moveY);
  haveCursor = true;
});
renderer.domElement.addEventListener('mouseleave', () => { haveCursor = false; hoverName = null; });

const _right = new THREE.Vector3();
const _up = new THREE.Vector3();
function tryStrike() {
  if (!haveCursor) { hoverName = null; return; }
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(pickMeshes, false);
  if (hits.length === 0) { hoverName = null; return; }

  const hit = hits[0];
  const name = hit.object.userData.bodyName;
  hoverName = name;

  if (cursorSpeed < 0.4) return; // hovering, not sweeping — no impulse
  const body = bodies[name];
  if (!body || body.userData.pinned) return;

  // build a world-space push from cursor screen motion
  _right.setFromMatrixColumn(camera.matrixWorld, 0); // camera X
  _up.setFromMatrixColumn(camera.matrixWorld, 1);    // camera Y
  const dir = new THREE.Vector3()
    .addScaledVector(_right, moveX)
    .addScaledVector(_up, -moveY);
  if (dir.lengthSq() < 1e-8) return;
  dir.normalize();

  const speed = Math.min(cursorSpeed, SPEED_CLAMP);
  const mag = speed * IMPULSE_K;

  const impulse = new CANNON.Vec3(dir.x * mag, dir.y * mag, dir.z * mag);
  const rel = new CANNON.Vec3(
    hit.point.x - body.position.x,
    hit.point.y - body.position.y,
    hit.point.z - body.position.z
  );
  body.applyImpulse(impulse, rel);

  // amplify the rotational response along the hit's torque axis
  const tau = rel.cross(impulse);
  const dOmega = body.invInertiaWorld.vmult(tau);
  const av = body.angularVelocity;
  av.x += dOmega.x * SPIN;
  av.y += dOmega.y * SPIN;
  av.z += dOmega.z * SPIN;
  const wlen = Math.sqrt(av.x * av.x + av.y * av.y + av.z * av.z);
  if (wlen > SPIN_MAXW) { const k = SPIN_MAXW / wlen; av.x *= k; av.y *= k; av.z *= k; }

  lastHit = mag;
  totalImpact += mag;
  peakBar = Math.min(1, mag / 14);

  // consume the motion so we don't re-apply the same delta next frame
  moveX = 0; moveY = 0; cursorSpeed = 0;
}

// ---------------------------------------------------------------
// HUD
// ---------------------------------------------------------------
const elTotal = document.getElementById('total');
const elLast = document.getElementById('last');
const elCvel = document.getElementById('cvel');
const elTarget = document.getElementById('target');
const elBar = document.getElementById('bar');
let hudTick = 0;
function updateHUD(dt) {
  hudTick += dt;
  peakBar *= Math.pow(0.04, dt); // decay the bar
  if (hudTick > 0.07) {
    hudTick = 0;
    elTotal.textContent = totalImpact.toFixed(1);
    elLast.textContent = lastHit > 0 ? lastHit.toFixed(2) + ' N·s' : '— N·s';
    elCvel.textContent = Math.round(cursorSpeed) + ' px/f';
    elTarget.textContent = hoverName ? prettyName(hoverName) : 'none';
    elTarget.id = hoverName ? 'peakflash' : 'target';
    elBar.style.width = (peakBar * 100).toFixed(0) + '%';
  }
}
function prettyName(n) {
  return n.replace(/([A-Z])/g, ' $1').replace(/(L|R)$/, m => ' ' + m).toUpperCase();
}

// ---------------------------------------------------------------
// Animation loop — fixed-step physics for stable 60fps
// ---------------------------------------------------------------
const clock = new THREE.Clock();
const FIXED = 1 / 60;
let acc = 0;

function animate() {
  requestAnimationFrame(animate);
  if (!started) return;
  let dt = clock.getDelta();
  if (dt > 0.1) dt = 0.1; // clamp tab-switch spikes

  tryStrike();

  acc += dt;
  let steps = 0;
  while (acc >= FIXED && steps < 5) {
    applyPoseControllers();
    applyJointLimits();
    world.step(FIXED);
    acc -= FIXED;
    steps++;
  }

  // sync proxy colliders to physics
  for (const name in proxByName) {
    const b = bodies[name], pm = proxByName[name];
    pm.position.set(b.position.x, b.position.y, b.position.z);
    pm.quaternion.set(b.quaternion.x, b.quaternion.y, b.quaternion.z, b.quaternion.w);
  }

  // slave the skinned model's bones to the physics bodies
  driveBones();

  updateHUD(dt);
  renderer.render(scene, camera);
}

// ---------------------------------------------------------------
// Resize
// ---------------------------------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  frameCamera();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// inspection hook — also lets you live-tune the muscle gains (window.__sim.TUNE)
// and snap the dummy back to its neutral stance (window.__sim.reset()).
window.__sim = {
  bodies, world, camera, scene, TUNE,
  get totalImpact() { return totalImpact; },
  reset() {
    for (const [name, b] of Object.entries(bodies)) {
      const rp = restPos[name], rq = restQuats[name];
      b.position.set(rp.x, rp.y, rp.z);
      b.quaternion.set(rq.x, rq.y, rq.z, rq.w);
      b.velocity.set(0, 0, 0);
      b.angularVelocity.set(0, 0, 0);
      b.force.set(0, 0, 0);
      b.torque.set(0, 0, 0);
    }
  },
};
</script>
</body>
